<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up - Car Rental</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* Reset & base */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      width: 100%;
      border: 2px solid #ff7f27;
      border-radius: 16px;
      padding: 40px 35px;
      box-shadow: 0 6px 20px rgba(255, 127, 39, 0.25);
      background: #fff;
    }

    h2 {
      margin: 0 0 30px;
      color: #ff7f27;
      font-weight: 600;
      font-size: 2rem;
      text-align: center;
      letter-spacing: 1px;
    }

    form {
      width: 100%;
    }

    .input-box {
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1.8px solid #ddd;
      background: #fff;
      color: #333;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #ff7f27;
      box-shadow: 0 0 8px rgba(255, 127, 39, 0.5);
      background: #fff;
    }

    .btn {
      width: 100%;
      background: #ff7f27;
      border: none;
      padding: 16px 0;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.15rem;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      box-shadow: 0 6px 15px rgba(255, 127, 39, 0.4);
    }

    .btn:hover {
      background: #e5721b;
      transform: translateY(-2px);
      box-shadow: 0 9px 22px rgba(229, 114, 27, 0.7);
    }

    .signin-link {
      margin-top: 20px;
      text-align: center;
      font-weight: 400;
      font-size: 0.95rem;
      color: #555;
    }

    .signin-link a {
      color: #ff7f27;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .signin-link a:hover {
      color: #e5721b;
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 420px) {
      .container {
        padding: 30px 25px;
      }
      h2 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <section id="signup" class="signup-section container">
    <div class="signup-box">
      <h2>Create Your Account</h2>
      <form class="signup-form" novalidate>
        <div class="input-box">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required />
        </div>
        <div class="input-box">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />
        </div>
        <div class="input-box">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password" required />
        </div>
        <div class="input-box">
          <label for="confpassword">Confirm Password</label>
          <input type="password" id="confpassword" name="confpassword" placeholder="Confirm your password" required />
        </div>
        <button type="submit" class="btn">Sign Up</button>
      </form>
      <p class="signin-link">Already have an account? <a href="loginpage.html">Log In</a></p>
    </div>
  </section>

  <script>
    document.querySelector('.signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const fullname = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confpassword = document.getElementById('confpassword').value;

      if (password !== confpassword) {
        alert('Passwords do not match');
        return;
      }

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullname, email, password })
        });
        const data = await res.json();

        if (res.ok) {
          alert(data.message);
          window.location.href = 'loginpage.html';
        } else {
          alert(data.error);
        }
      } catch (error) {
        alert('Error signing up');
        console.error(error);
      }
    });
  </script>
</body>
</html>
