<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Page</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
</head>
<body>
<section class="payment-section container">
    <h2>Complete Your Payment</h2>
    <p>Please enter your payment details or scan a QR code to complete the payment.</p>

    <!-- Payment Form -->
    <form id="payment-form" class="payment-form">
        <div class="input-box">
            <label for="card-name">Name on Card</label>
            <input type="text" id="card-name" name="name" placeholder="Enter cardholder's name" required />
        </div>

        <div class="input-box">
            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" name="cardNumber" placeholder="Enter card number" required pattern="\d{13,19}" title="Enter a valid card number" />
        </div>

        <div class="input-box">
            <label for="expiration">Expiration Date</label>
            <input type="month" id="expiration" name="expiration" required />
        </div>

        <div class="input-box">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv" placeholder="Enter CVV" required pattern="\d{3,4}" title="Enter a valid CVV" />
        </div>

        <button type="submit" class="btn" id="pay-btn">Pay Now</button>
    </form>

    <!-- Confirmation Message -->
    <div id="payment-confirmation-message" class="confirmation-message" style="margin-top: 20px; font-weight: 600;"></div>

    <!-- QR Code Scanner Section -->
    <div id="qr-scanner-container" style="margin-top: 40px;">
        <h3>Or scan a QR code to pay</h3>
        <div id="qr-reader" style="width: 300px;"></div>
        <div id="qr-result" style="display: none; margin-top: 10px; color: green; font-weight: 600;">
            QR Code Scanned Successfully! Proceeding with Payment...
        </div>
    </div>
</section>

<script>
    // Handle form submission
    document.getElementById('payment-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('card-name').value.trim();
        const cardNumber = document.getElementById('card-number').value.trim();
        const expiration = document.getElementById('expiration').value;
        const cvv = document.getElementById('cvv').value.trim();

        if (!name || !cardNumber || !expiration || !cvv) {
            alert('Please fill all payment fields.');
            return;
        }

        try {
            const response = await fetch('/api/payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, cardNumber, expiration, cvv })
            });

            const data = await response.json();
            if (response.ok) {
                document.getElementById('payment-confirmation-message').textContent = data.message;
                // Optionally clear the form
                document.getElementById('payment-form').reset();
            } else {
                alert(data.error);
            }
        } catch (err) {
            alert('Error processing payment. Please try again.');
            console.error(err);
        }
    });

    // QR Code Scanner setup
    function onScanSuccess(decodedText, decodedResult) {
        // Handle the scanned code as payment confirmation or trigger payment logic
        document.getElementById('qr-result').style.display = 'block';
        console.log(`QR Code detected: ${decodedText}`);

        // Stop scanning after success
        html5QrcodeScanner.clear().catch(error => {
            console.error('Failed to clear QR scanner.', error);
        });

        alert('QR code scanned successfully. Payment is being processed.');

        // Here, you might want to parse decodedText and send payment data to backend

        // For example, if QR contains JSON with payment info:
        // try {
        //   const paymentData = JSON.parse(decodedText);
        //   // Send paymentData to backend...
        // } catch(e) {
        //   alert('Invalid QR code data');
        // }
    }

    function onScanFailure(error) {
        // console.warn(`QR scan failed: ${error}`);
        // We can ignore or show in UI if needed
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "qr-reader",
        { fps: 10, qrbox: 250 },
        false
    );
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>
</body>
</html>
