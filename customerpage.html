<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Support - Car Rental</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* Base styles */
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #fff; /* White background */
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 450px;
      background: #fff;
      border: 1.5px solid #ff7f27;
      border-radius: 12px;
      padding: 40px 35px;
      box-shadow: 0 6px 18px rgba(255, 127, 39, 0.25);
      text-align: center;
    }
    h2 {
      color: #ff7f27;
      font-weight: 600;
      font-size: 2rem;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }
    form {
      text-align: left;
    }
    .input-box {
      margin-bottom: 22px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1.8px solid #ddd;
      background: #fff;
      color: #333;
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: 'Poppins', sans-serif;
      resize: vertical;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #ff7f27;
      box-shadow: 0 0 6px rgba(255, 127, 39, 0.5);
      background: #fff;
    }
    .btn {
      width: 100%;
      background: #ff7f27;
      border: none;
      padding: 16px 0;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.15rem;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 6px 15px rgba(255, 127, 39, 0.4);
      display: block;
      margin-top: 10px;
    }
    .btn:hover {
      background: #e5721b;
      transform: translateY(-2px);
      box-shadow: 0 9px 22px rgba(229, 114, 27, 0.7);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }
      h2 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <section class="container">
    <h2>Contact Support</h2>
    <form id="support-form" novalidate>
      <div class="input-box">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required />
      </div>
      <div class="input-box">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email" required />
      </div>
      <div class="input-box">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Your message" required></textarea>
      </div>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>

  <script>
    document.getElementById('support-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      try {
        const res = await fetch('/api/support', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message }),
        });

        const data = await res.json();
        alert(data.message);

        if (res.ok) {
          e.target.reset();
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });
  </script>
</body>
</html>
