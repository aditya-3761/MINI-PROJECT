<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <style>
    /* Base Reset */
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #fff;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container {
      max-width: 460px;
      width: 100%;
      background: #fff;
      border: 2px solid #ff7f27;
      border-radius: 14px;
      padding: 40px 35px;
      box-shadow: 0 6px 18px rgba(255, 127, 39, 0.25);
    }
    h2 {
      color: #ff7f27;
      font-weight: 600;
      font-size: 2rem;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 1px;
    }
    p {
      color: #555;
      margin-bottom: 30px;
      font-weight: 400;
      text-align: center;
      line-height: 1.5;
    }
    form {
      text-align: left;
    }
    .input-box {
      margin-bottom: 22px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    input[type="text"],
    input[type="month"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1.8px solid #ddd;
      background: #fff;
      color: #333;
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    input[type="text"]:focus,
    input[type="month"]:focus {
      outline: none;
      border-color: #ff7f27;
      box-shadow: 0 0 6px rgba(255, 127, 39, 0.5);
      background: #fff;
    }
    .btn {
      width: 100%;
      background: #ff7f27;
      border: none;
      padding: 16px 0;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.15rem;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 6px 15px rgba(255, 127, 39, 0.4);
      display: block;
      margin-top: 10px;
    }
    .btn:hover {
      background: #e5721b;
      transform: translateY(-2px);
      box-shadow: 0 9px 22px rgba(229, 114, 27, 0.7);
    }
    .confirmation-message {
      margin-top: 20px;
      font-weight: 600;
      color: #2a7f27; /* Slightly darker green for success */
      text-align: center;
    }
    #qr-scanner-container {
      margin-top: 40px;
      text-align: center;
    }
    #qr-scanner-container h3 {
      color: #ff7f27;
      font-weight: 600;
      margin-bottom: 15px;
    }
    #qr-reader {
      margin: 0 auto;
      border: 2px solid #ff7f27;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(255, 127, 39, 0.25);
      max-width: 300px;
      width: 100%;
    }
    #qr-result {
      display: none;
      margin-top: 10px;
      color: #2a7f27;
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }
      h2 {
        font-size: 1.75rem;
      }
      #qr-reader {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <section class="payment-section container">
    <h2>Complete Your Payment</h2>
    <p>Please enter your payment details or scan a QR code to complete the payment.</p>

    <!-- Payment Form -->
    <form id="payment-form" class="payment-form" novalidate>
      <div class="input-box">
        <label for="card-name">Name on Card</label>
        <input
          type="text"
          id="card-name"
          name="name"
          placeholder="Enter cardholder's name"
          required
        />
      </div>

      <div class="input-box">
        <label for="card-number">Card Number</label>
        <input
          type="text"
          id="card-number"
          name="cardNumber"
          placeholder="Enter card number"
          required
          pattern="\d{13,19}"
          title="Enter a valid card number"
        />
      </div>

      <div class="input-box">
        <label for="expiration">Expiration Date</label>
        <input type="month" id="expiration" name="expiration" required />
      </div>

      <div class="input-box">
        <label for="cvv">CVV</label>
        <input
          type="text"
          id="cvv"
          name="cvv"
          placeholder="Enter CVV"
          required
          pattern="\d{3,4}"
          title="Enter a valid CVV"
        />
      </div>

      <button type="submit" class="btn" id="pay-btn">Pay Now</button>
    </form>

    <!-- Confirmation Message -->
    <div id="payment-confirmation-message" class="confirmation-message"></div>

    <!-- QR Code Scanner Section -->
    <div id="qr-scanner-container">
      <h3>Or scan a QR code to pay</h3>
      <div id="qr-reader"></div>
      <div id="qr-result">
        QR Code Scanned Successfully! Proceeding with Payment...
      </div>
    </div>
  </section>

  <script>
    // Handle form submission
    document.getElementById('payment-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('card-name').value.trim();
      const cardNumber = document.getElementById('card-number').value.trim();
      const expiration = document.getElementById('expiration').value;
      const cvv = document.getElementById('cvv').value.trim();

      if (!name || !cardNumber || !expiration || !cvv) {
        alert('Please fill all payment fields.');
        return;
      }

      try {
        const response = await fetch('/api/payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, cardNumber, expiration, cvv }),
        });

        const data = await response.json();
        if (response.ok) {
          document.getElementById('payment-confirmation-message').textContent = data.message;
          // Optionally clear the form
          document.getElementById('payment-form').reset();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('Error processing payment. Please try again.');
        console.error(err);
      }
    });

    // QR Code Scanner setup
    function onScanSuccess(decodedText, decodedResult) {
      document.getElementById('qr-result').style.display = 'block';
      console.log(`QR Code detected: ${decodedText}`);

      // Stop scanning after success
      html5QrcodeScanner.clear().catch((error) => {
        console.error('Failed to clear QR scanner.', error);
      });

      alert('QR code scanned successfully. Payment is being processed.');

      // TODO: handle decodedText (payment info) here
    }

    function onScanFailure(error) {
      // Ignore or show UI feedback if needed
    }

    let html5QrcodeScanner = new Html5QrcodeScanner('qr-reader', { fps: 10, qrbox: 250 }, false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
  </script>
</body>
</html>
