<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book a Car - Car Rental</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* Base styles */
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #fff; /* White background */
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 450px;
      background: #fff;
      border: 1.5px solid #ff7f27;
      border-radius: 12px;
      padding: 40px 35px;
      box-shadow: 0 6px 18px rgba(255, 127, 39, 0.25);
      text-align: center;
    }
    h2 {
      color: #ff7f27;
      font-weight: 600;
      font-size: 2rem;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }
    form {
      text-align: left;
    }
    .input-box {
      margin-bottom: 22px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    select,
    input[type="date"],
    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1.8px solid #ddd;
      background: #fff;
      color: #333;
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    select:focus,
    input[type="date"]:focus,
    input[type="text"]:focus,
    input[type="email"]:focus {
      outline: none;
      border-color: #ff7f27;
      box-shadow: 0 0 6px rgba(255, 127, 39, 0.5);
      background: #fff;
    }
    .btn {
      width: 100%;
      background: #ff7f27;
      border: none;
      padding: 16px 0;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.15rem;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 6px 15px rgba(255, 127, 39, 0.4);
      display: block;
      margin-top: 10px;
    }
    .btn:hover {
      background: #e5721b;
      transform: translateY(-2px);
      box-shadow: 0 9px 22px rgba(229, 114, 27, 0.7);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }
      h2 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <section class="container">
    <h2>Book Your Car</h2>
    <form id="booking-form" novalidate>
      <div class="input-box">
        <label for="car-model">Car Model</label>
        <select id="car-model" name="carModel" required>
          <option value="">Select a car model</option>
          <option value="Toyota Camry">Toyota Camry</option>
          <option value="Honda Civic">Honda Civic</option>
          <option value="Ford Mustang">Ford Mustang</option>
          <option value="Tesla Model 3">Tesla Model 3</option>
        </select>
      </div>
      <div class="input-box">
        <label for="pickup-date">Pick-up Date</label>
        <input type="date" id="pickup-date" name="pickupDate" required />
      </div>
      <div class="input-box">
        <label for="return-date">Return Date</label>
        <input type="date" id="return-date" name="returnDate" required />
      </div>
      <div class="input-box">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required />
      </div>
      <div class="input-box">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>
      <button type="submit" class="btn">Book Now</button>
    </form>
  </section>

  <script>
    document.getElementById('booking-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const carModel = document.getElementById('car-model').value;
      const pickupDate = document.getElementById('pickup-date').value;
      const returnDate = document.getElementById('return-date').value;
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      if (new Date(pickupDate) > new Date(returnDate)) {
        alert('Return date must be after pickup date.');
        return;
      }

      try {
        const res = await fetch('/api/bookings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ carModel, pickupDate, returnDate, name, email }),
        });

        const data = await res.json();
        alert(data.message);

        if (res.ok) {
          e.target.reset();
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });
  </script>
</body>
</html>
